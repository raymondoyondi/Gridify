version: '3.8'
services:
  backend:
    build: .
    container_name: gridify-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHON_ENV=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=http://localhost:5173
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis
    networks:
      - gridify-network
  redis:
    image: redis:7-alpine
    container_name: gridify-redis
    ports:
      - "6379:6379"
    networks:
      - gridify-network
  postgres:
    image: postgres:15
    restart: unless-stopped
    container_name: gridify-postgres
    environment:
      POSTGRES_USER: gridify
      POSTGRES_PASSWORD: gridify_password
      POSTGRES_DB: gridify
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - gridify-network
networks:
  gridify-network:
    driver: bridge
volumes:
  pgdata: {}

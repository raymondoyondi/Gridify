syntax = "proto3";

package gridify.processor;

option go_package = "gridify/data-processor/proto;proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service DataProcessorService {
  rpc ProcessCSV(ProcessCSVRequest) returns (ProcessCSVResponse);
  rpc QueryData(QueryDataRequest) returns (QueryDataResponse);
  rpc AggregateMetrics(AggregateMetricsRequest) returns (AggregateMetricsResponse);
  rpc TransformData(TransformDataRequest) returns (TransformDataResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message ProcessCSVRequest {
  string file_path = 1;
  string output_format = 2;  // json, parquet, arrow
  map<string, string> options = 3;
}

message ProcessCSVResponse {
  bool success = 1;
  string result_path = 2;
  int64 records_processed = 3;
  string error_message = 4;
  float processing_time_seconds = 5;
}

message QueryDataRequest {
  string query = 1;  // SQL query
  string data_source = 2;
  map<string, google.protobuf.Value> parameters = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message QueryDataResponse {
  bool success = 1;
  repeated google.protobuf.Struct rows = 2;
  int64 total_rows = 3;
  string error_message = 4;
  float query_time_ms = 5;
}

message AggregateMetricsRequest {
  string metric_type = 1;
  string group_by = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  repeated string aggregations = 5;  // count, sum, avg, min, max, stddev
}

message AggregateMetricsResponse {
  bool success = 1;
  repeated AggregationResult results = 2;
  string error_message = 3;
}

message AggregationResult {
  string group_key = 1;
  map<string, google.protobuf.Value> aggregates = 2;
}

message TransformDataRequest {
  string input_source = 1;
  repeated TransformOperation operations = 2;
  string output_format = 3;
}

message TransformOperation {
  string type = 1;  // filter, select, sort, aggregate, pivot
  map<string, string> params = 2;
}

message TransformDataResponse {
  bool success = 1;
  string output_path = 2;
  int64 output_records = 3;
  string error_message = 4;
  float execution_time_seconds = 5;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;  // healthy, degraded, unhealthy
  map<string, string> components = 2;
}

name: Gridify CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Tailwind Native Bindings
        run: npm install @tailwindcss/oxide-linux-x64-gnu --no-save
        
      - name: Lint and Type-Check
        run: npm run lint
        
      - name: Build Frontend Assets
        run: npm run build
        
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install flake8 black mypy pytest
          
      - name: Backend Linting & Formatting
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black .
          mypy . --ignore-missing-imports
          
      - name: Run Backend Tests
        run: |
          cd backend
          pytest
          
  docker-build:
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    steps:
    
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - name: Build Backend Docker Image
        run: docker build -t gridify-backend ./backend

version: '3.8'

services:
  backend:
    build: .
    container_name: gridify-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHON_ENV=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=http://localhost:5173
      - LOG_LEVEL=INFO
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - gridify-network

networks:
  gridify-network:
    driver: bridge
    
